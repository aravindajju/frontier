<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" role="img" aria-label="The Loop: a weekly cycle of show, discuss, ship again. Each turn updates the Scorecard and fills the Ledger.">
  <defs>
    <marker id="lh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#e8611f" stroke-width="1.6"/>
    </marker>
    <marker id="lg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#8a8577" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- cycle arcs (clockwise): SHOW top, DISCUSS lower-right, SHIP lower-left -->
  <path d="M368,132 A150,150 0 0 1 400,352" fill="none" stroke="#e8611f" stroke-width="1.6" marker-end="url(#lh)"/>
  <path d="M330,398 A150,150 0 0 1 172,346" fill="none" stroke="#e8611f" stroke-width="1.6" marker-end="url(#lh)"/>
  <path d="M148,280 A150,150 0 0 1 254,128" fill="none" stroke="#e8611f" stroke-width="1.6" marker-end="url(#lh)"/>

  <!-- nodes -->
  <rect x="240" y="76" width="160" height="56" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="320" y="100" text-anchor="middle" fill="#8a8577" font-size="14" letter-spacing="2">SHOW</text>
  <text x="320" y="120" text-anchor="middle" fill="#8a8577" font-size="11">working software only</text>

  <rect x="356" y="352" width="180" height="56" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="446" y="376" text-anchor="middle" fill="#8a8577" font-size="14" letter-spacing="2">DISCUSS</text>
  <text x="446" y="396" text-anchor="middle" fill="#8a8577" font-size="11">Sponsor in the room</text>

  <rect x="96" y="352" width="180" height="56" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="186" y="376" text-anchor="middle" fill="#8a8577" font-size="14" letter-spacing="2">SHIP AGAIN</text>
  <text x="186" y="396" text-anchor="middle" fill="#8a8577" font-size="11">days, not quarters</text>

  <!-- center -->
  <text x="320" y="262" text-anchor="middle" fill="#e8611f" font-size="14" letter-spacing="3">WEEKLY</text>
  <text x="320" y="282" text-anchor="middle" fill="#8a8577" font-size="11">the Showcase</text>

  <!-- taps -->
  <path d="M400,104 L520,104" fill="none" stroke="#8a8577" stroke-width="1.2" stroke-dasharray="4 5" marker-end="url(#lg)"/>
  <text x="528" y="100" fill="#8a8577" font-size="11">the Scorecard</text>
  <text x="528" y="116" fill="#8a8577" font-size="11">updates</text>

  <path d="M186,408 L186,470" fill="none" stroke="#8a8577" stroke-width="1.2" stroke-dasharray="4 5" marker-end="url(#lg)"/>
  <text x="200" y="466" fill="#8a8577" font-size="11">the Ledger fills as overfits happen</text>
</svg>
