<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" role="img" aria-label="The four accountabilities: the Frontier Engineer and Field Strategist work as a pair in the field; the Customer Sponsor owns the outcome on the customer side; the Core Counterpart receives extractions in the product team.">
  <defs>
    <marker id="th" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#8a8577" stroke-width="1.6"/>
    </marker>
    <marker id="thO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#e8611f" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- core -->
  <text x="130" y="96" text-anchor="middle" fill="#8a8577" font-size="11" letter-spacing="2">THE CORE</text>
  <rect x="30" y="110" width="200" height="84" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="130" y="144" text-anchor="middle" fill="#8a8577" font-size="13">CORE COUNTERPART</text>
  <text x="130" y="164" text-anchor="middle" fill="#8a8577" font-size="11">receives extractions,</text>
  <text x="130" y="180" text-anchor="middle" fill="#8a8577" font-size="11">owes them a decision</text>

  <!-- field group -->
  <rect x="300" y="60" width="280" height="290" fill="none" stroke="#e8611f" stroke-width="1.2" stroke-dasharray="5 6"/>
  <text x="440" y="46" text-anchor="middle" fill="#e8611f" font-size="11" letter-spacing="2">THE FIELD</text>

  <rect x="325" y="86" width="230" height="84" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" fill="#8a8577" font-size="13">FRONTIER ENGINEER</text>
  <text x="440" y="140" text-anchor="middle" fill="#8a8577" font-size="11">builds the outcome,</text>
  <text x="440" y="156" text-anchor="middle" fill="#8a8577" font-size="11">agents in the toolchain</text>

  <rect x="325" y="240" width="230" height="84" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="440" y="274" text-anchor="middle" fill="#8a8577" font-size="13">FIELD STRATEGIST</text>
  <text x="440" y="294" text-anchor="middle" fill="#8a8577" font-size="11">owns adoption, politics,</text>
  <text x="440" y="310" text-anchor="middle" fill="#8a8577" font-size="11">and problem selection</text>

  <!-- pair link -->
  <line x1="440" y1="170" x2="440" y2="240" stroke="#8a8577" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- customer -->
  <text x="750" y="96" text-anchor="middle" fill="#8a8577" font-size="11" letter-spacing="2">THE CUSTOMER</text>
  <rect x="650" y="110" width="200" height="84" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="750" y="144" text-anchor="middle" fill="#8a8577" font-size="13">CUSTOMER SPONSOR</text>
  <text x="750" y="164" text-anchor="middle" fill="#8a8577" font-size="11">owns the outcome,</text>
  <text x="750" y="180" text-anchor="middle" fill="#8a8577" font-size="11">unblocks access</text>

  <!-- links -->
  <path d="M230,152 L318,152" fill="none" stroke="#8a8577" stroke-width="1.5" marker-end="url(#th)" marker-start="url(#th)"/>
  <text x="274" y="136" text-anchor="middle" fill="#8a8577" font-size="10">FIELD-CORE SYNC,</text>
  <text x="274" y="212" text-anchor="middle" fill="#8a8577" font-size="10">EXTRACTIONS</text>

  <path d="M562,152 L644,152" fill="none" stroke="#e8611f" stroke-width="1.5" marker-end="url(#thO)" marker-start="url(#thO)"/>
  <text x="603" y="136" text-anchor="middle" fill="#e8611f" font-size="10">THE SHOWCASE,</text>
  <text x="603" y="212" text-anchor="middle" fill="#e8611f" font-size="10">WEEKLY</text>
</svg>
