<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace" role="img" aria-label="The FDE test: three yes-or-no questions. Production code in the customer's environment on real data; a named business outcome, owned; an obligation to leave a trace in the product. A no routes to solutions engineering, staff augmentation, or consulting. Three yeses mean Forward Deployed Engineering.">
  <defs>
    <marker id="fh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#8a8577" stroke-width="1.6"/>
    </marker>
    <marker id="fhO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#e8611f" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- Q1 -->
  <rect x="50" y="40" width="400" height="78" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="70" y="72" fill="#8a8577" font-size="13">Production code in the customer's</text>
  <text x="70" y="92" fill="#8a8577" font-size="13">environment, on real data?</text>
  <path d="M450,79 L580,79" fill="none" stroke="#8a8577" stroke-width="1.5" marker-end="url(#fh)"/>
  <text x="500" y="70" fill="#8a8577" font-size="11">NO</text>
  <text x="592" y="72" fill="#8a8577" font-size="12">solutions</text>
  <text x="592" y="90" fill="#8a8577" font-size="12">engineering</text>

  <!-- yes 1→2 -->
  <path d="M250,118 L250,168" fill="none" stroke="#e8611f" stroke-width="1.5" marker-end="url(#fhO)"/>
  <text x="262" y="148" fill="#e8611f" font-size="11">YES</text>

  <!-- Q2 -->
  <rect x="50" y="172" width="400" height="78" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="70" y="204" fill="#8a8577" font-size="13">A named business outcome,</text>
  <text x="70" y="224" fill="#8a8577" font-size="13">owned by the engineer?</text>
  <path d="M450,211 L580,211" fill="none" stroke="#8a8577" stroke-width="1.5" marker-end="url(#fh)"/>
  <text x="500" y="202" fill="#8a8577" font-size="11">NO</text>
  <text x="592" y="204" fill="#8a8577" font-size="12">staff</text>
  <text x="592" y="222" fill="#8a8577" font-size="12">augmentation</text>

  <!-- yes 2→3 -->
  <path d="M250,250 L250,300" fill="none" stroke="#e8611f" stroke-width="1.5" marker-end="url(#fhO)"/>
  <text x="262" y="280" fill="#e8611f" font-size="11">YES</text>

  <!-- Q3 -->
  <rect x="50" y="304" width="400" height="78" fill="none" stroke="#8a8577" stroke-width="1.5"/>
  <text x="70" y="336" fill="#8a8577" font-size="13">An obligation to leave a trace</text>
  <text x="70" y="356" fill="#8a8577" font-size="13">in the product?</text>
  <path d="M450,343 L580,343" fill="none" stroke="#8a8577" stroke-width="1.5" marker-end="url(#fh)"/>
  <text x="500" y="334" fill="#8a8577" font-size="11">NO</text>
  <text x="592" y="348" fill="#8a8577" font-size="12">consulting</text>

  <!-- yes 3→result -->
  <path d="M250,382 L250,432" fill="none" stroke="#e8611f" stroke-width="1.5" marker-end="url(#fhO)"/>
  <text x="262" y="412" fill="#e8611f" font-size="11">YES</text>

  <rect x="50" y="436" width="400" height="60" fill="none" stroke="#e8611f" stroke-width="2"/>
  <text x="250" y="472" text-anchor="middle" fill="#e8611f" font-size="14" letter-spacing="2">FORWARD DEPLOYED ENGINEERING</text>
</svg>
